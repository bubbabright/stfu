<!--
  stfu/templates/index.html — Mobile-first volume control UI
  v4.0 — MQTT captions, slider, buttons
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>STFU — HDTV Volume</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

:root {
    --accent: #ff5555;
    --bg: #0f0f0f;
    --card: #1a1a1a;
    --card-press: #2a2a2a;
    --text: #eee;
    --muted: #888;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
    margin: 0; padding: 16px;
    background: var(--bg); color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    text-align: center;
}

.container { max-width: 480px; margin: auto; }

h1 { font-size: 1.4rem; opacity: 0.7; margin-bottom: 10px; }
.version { font-size: 0.7rem; opacity: 0.5; font-weight: 400; margin-left: 8px; }

.volume-display {
    font-size: 5rem; font-weight: 700;
    margin: 10px 0;
    transition: transform 0.1s ease, color 0.2s;
}
.volume-display.bump { transform: scale(1.06); }

.slider-container {
    background: var(--card); border-radius: 20px;
    padding: 14px; margin: 25px 0;
}

input[type="range"] {
    width: 100%; height: 50px; accent-color: var(--accent);
}

.buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

button {
    font-size: 1.8rem; padding: 22px; border-radius: 18px;
    border: none; background: var(--card); color: var(--text);
    transition: transform 0.08s, background 0.1s;
}
button:active { transform: scale(0.94); background: var(--card-press); }
.mute-btn { grid-column: span 2; font-size: 1.3rem; }
.muted { background: var(--accent); color: white; }

#status { margin-top: 12px; font-size: 0.9rem; color: var(--muted); min-height: 18px; }

/* CC Crawl */
.cc-wrap {
    margin-top: 28px; background: var(--card); border-radius: 16px;
    height: 120px; overflow: hidden; position: relative;
}
.cc-wrap::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 36px;
    background: linear-gradient(to bottom, var(--card), transparent);
    z-index: 2; pointer-events: none;
}
.cc-inner {
    display: flex; flex-direction: column-reverse;
    padding: 12px 16px; gap: 6px;
    position: absolute; bottom: 0; left: 0; right: 0;
}
.cc-batch {
    font-size: 0.95rem; line-height: 1.45; color: #fff;
    opacity: 0; transform: translateY(12px);
    animation: cc-rise 0.4s ease forwards;
}
.cc-batch.old { opacity: 0.4; font-size: 0.85rem; }
@keyframes cc-rise { to { opacity: 1; transform: translateY(0); } }

.cc-status { margin-top: 6px; font-size: 0.7rem; color: var(--muted); letter-spacing: 0.05em; }
.cc-dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: #555; margin-right: 5px; vertical-align: middle; transition: background 0.3s;
}
.cc-dot.live { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
</style>
</head>

<body>
<div class="container">
    <h1>HDTV Volume Control <span class="version">v{{ version }}</span></h1>

    <div id="volume-text" class="volume-display">--%</div>

    <div class="slider-container">
        <input type="range" id="volume-slider" min="0" max="100" value="50">
    </div>

    <div class="buttons">
        <button id="btn-down">&minus;</button>
        <button id="btn-up">+</button>
        <button id="btn-mute" class="mute-btn">Mute</button>
    </div>

    <div id="status"></div>

    <div class="cc-wrap">
        <div class="cc-inner" id="cc-inner"></div>
    </div>
    <div class="cc-status">
        <span class="cc-dot" id="cc-dot"></span>
        <span id="cc-status-text">waiting for captions&hellip;</span>
    </div>
</div>

<script>
const POLL_INTERVAL = {{ poll_interval }};
const MAX_BATCHES = 2;

let debounceTimer;
let lastUpdate = 0;
let ccBatches = [];

const volumeText = document.getElementById('volume-text');
const slider = document.getElementById('volume-slider');
const muteBtn = document.getElementById('btn-mute');
const statusEl = document.getElementById('status');
const ccInner = document.getElementById('cc-inner');
const ccDot = document.getElementById('cc-dot');
const ccStatusText = document.getElementById('cc-status-text');

function bump() { volumeText.classList.add('bump'); setTimeout(() => volumeText.classList.remove('bump'), 100); }
function haptic() { if (navigator.vibrate) navigator.vibrate(10); }
function setStatus(msg) { statusEl.textContent = msg; setTimeout(() => statusEl.textContent = '', 1500); }

async function fetchVolume() {
    try {
        const res = await fetch('/volume');
        const data = await res.json();
        volumeText.textContent = data.volume + '%';
        slider.value = data.volume;
        muteBtn.textContent = data.muted ? 'Unmute' : 'Mute';
        muteBtn.classList.toggle('muted', data.muted);
    } catch { setStatus('connection error'); }
}

slider.addEventListener('input', () => {
    const vol = parseInt(slider.value);
    volumeText.textContent = vol + '%';
    bump();
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(async () => {
        try {
            await fetch('/volume/set', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ volume: vol })
            });
            haptic();
        } catch { setStatus('failed'); }
    }, 120);
});

document.getElementById('btn-up').onclick = async () => { await fetch('/volume/up', {method:'POST'}); haptic(); bump(); fetchVolume(); };
document.getElementById('btn-down').onclick = async () => { await fetch('/volume/down', {method:'POST'}); haptic(); bump(); fetchVolume(); };
document.getElementById('btn-mute').onclick = async () => { await fetch('/volume/mute', {method:'POST'}); haptic(); fetchVolume(); };

setInterval(() => {
    const now = Date.now();
    if (now - lastUpdate > POLL_INTERVAL - 50) { lastUpdate = now; fetchVolume(); }
}, POLL_INTERVAL);
fetchVolume();

// CC Crawl via MQTT
function renderCC() {
    ccInner.innerHTML = '';
    ccBatches.forEach((text, i) => {
        const div = document.createElement('div');
        div.className = 'cc-batch' + (i < ccBatches.length - 1 ? ' old' : '');
        div.textContent = text;
        ccInner.prepend(div);
    });
}
function pushCC(text) {
    ccBatches.push(text);
    if (ccBatches.length > MAX_BATCHES) ccBatches.shift();
    renderCC();
    ccDot.classList.add('live');
    ccStatusText.textContent = 'live';
}
</script>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script>
const mqttClient = mqtt.connect("ws://{{ mqtt_ws_url }}");
mqttClient.on("connect", () => {
    mqttClient.subscribe("htpc/captions");
    mqttClient.subscribe("htpc/volume/state");
});
mqttClient.on("message", (topic, message) => {
    const text = message.toString();
    if (topic === "htpc/captions") pushCC(text);
});
mqttClient.on("error", () => {
    ccDot.classList.remove('live');
    ccStatusText.textContent = 'reconnecting\u2026';
});
</script>

</body>
</html>
